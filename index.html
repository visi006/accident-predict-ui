<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcciPredict | Secure Login</title>
    <!-- Modern Typography: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Specific Login Page Overrides */
        body { 
            display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden;
            background: linear-gradient(-45deg, #0D0D0D, #111008, #160C06, #0D0A0D);
            background-size: 400% 400%; animation: ambientDrift 20s ease infinite;
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .login-wrapper { width: 100%; max-width: 420px; padding: 2rem; z-index: 10; animation: cascadeUp 0.8s ease both; }
        .login-card {
            background-color: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 3rem 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3); text-align: center;
        }
        .login-header { margin-bottom: 2.5rem; }
        .dept-seal { 
            width: 70px; height: 70px; background: rgba(232, 130, 12, 0.15); 
            border: 1px solid rgba(232, 130, 12, 0.4); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            margin: 0 auto 1.2rem auto; box-shadow: 0 0 20px rgba(232, 130, 12, 0.2); 
        }
        .dept-seal i { color: #E8820C; width: 32px; height: 32px; }
        .login-header h2 { font-size: 1.6rem; font-weight: 700; color: white; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
        .login-header p { font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        
        .input-group label { text-align: left; margin-bottom: 8px; display: block; font-size: 0.85rem; color: var(--text-secondary); font-weight: 500;}
        .input-group input { 
            width: 100%; padding: 14px 16px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); 
            color: white; font-size: 1rem; margin-bottom: 1.5rem; border-radius: 8px; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        .input-group input:focus { background: rgba(0,0,0,0.4); border-color: #E8820C; box-shadow: 0 0 0 3px rgba(232, 130, 12, 0.2); }
        
        .btn-login {
            display: flex; justify-content: center; align-items: center; gap: 8px;
            width: 100%; padding: 14px; background: linear-gradient(90deg, #E8820C, #D94F1E); color: white; font-weight: 600; font-size: 1rem; 
            border: none; border-radius: 8px; cursor: pointer; transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(232, 130, 12, 0.3); margin-top: 0.5rem;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(217, 79, 30, 0.5); }
        
        .security-badge { margin-top: 2rem; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 0.75rem; color: var(--text-muted); }
        .security-badge i { width: 14px; height: 14px; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="dept-seal">
                    <i data-lucide="shield-alert"></i>
                </div>
                <h2>Secure Portal</h2>
                <p>Traffic Admin Sign-in</p>
            </div>
            
            <form id="loginForm" autocomplete="off">
                <div class="input-group">
                    <label>Official ID / Email</label>
                    <input type="text" placeholder="Enter your authorized ID" required>
                </div>
                <div class="input-group">
                    <label>Passcode</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login"><i data-lucide="log-in"></i> Access System</button>
            </form>
            
            <div class="security-badge">
                <i data-lucide="lock"></i> 256-bit Encrypted Government Connection
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Mock authentication effect
            const btn = document.querySelector('.btn-login');
            btn.innerHTML = '<i data-lucide="loader" class="spin"></i> Authenticating...';
            lucide.createIcons();
            btn.style.opacity = '0.8';
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1200);
        });

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
